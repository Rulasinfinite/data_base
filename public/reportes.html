<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIDEC — Reportes</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .chart-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }
    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .stats-mini {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .mini-card {
      flex: 1 1 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .mini-card .val {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }
    .mini-card .lbl {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }
    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
      .stats-mini { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <div>
      <h1 style="font-size:22px;font-weight:700;color:var(--gray-800);margin:0;">📊 Reportes</h1>
      <p style="font-size:13px;color:var(--gray-500);margin-top:4px;">Estadísticas del sistema de calibración</p>
    </div>
  </div>

  <!-- Mini estadísticas -->
  <div class="stats-mini" id="stats-mini">
    <div class="mini-card">
      <div class="val" id="mini-total">—</div>
      <div class="lbl">Total certificados</div>
    </div>
    <div class="mini-card">
      <div class="val" id="mini-anios">—</div>
      <div class="lbl">Años con datos</div>
    </div>
    <div class="mini-card">
      <div class="val" id="mini-clientes">—</div>
      <div class="lbl">Clientes únicos (global)</div>
    </div>
    <div class="mini-card">
      <div class="val" id="mini-marcas">—</div>
      <div class="lbl">Marcas únicas (global)</div>
    </div>
  </div>

  <!-- Gráfico principal de barras -->
  <div class="charts-grid">
    <div class="chart-card" style="grid-column: 1 / -1;">
      <h3>📈 Certificados emitidos por año</h3>
      <div class="chart-container">
        <canvas id="chart-anios"></canvas>
      </div>
    </div>
  </div>

  <!-- Tabla por año -->
  <div class="table-card">
    <div class="card-header">
      <span class="card-title">📋 Detalle por año</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Año</th>
            <th>Certificados</th>
            <th>Clientes</th>
            <th>Marcas</th>
            <th>Primera emisión</th>
            <th>Última emisión</th>
          </tr>
        </thead>
        <tbody id="tabla-anios">
          <tr class="empty-row"><td colspan="6">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
  // ── Control de acceso: solo roles "reportes", "calidad" o "admin" ──
  if (!Auth.requireLogin()) throw new Error('not logged');
  if (!Auth.hasRole('reportes')) {
    window.location.href = '/dashboard.html';
    throw new Error('acceso denegado');
  }
  renderNavbar('reportes');

  let chartInstance = null;

  async function cargarDatos() {
    try {
      const data = await api('/certificados/stats/resumen');
      actualizarMiniStats(data);
      construirGrafico(data.por_anio);
      construirTabla(data.por_anio);
    } catch (e) {
      showAlert('Error al cargar estadísticas: ' + e.message, 'error');
      document.getElementById('tabla-anios').innerHTML =
        '<tr class="empty-row"><td colspan="6">Error al cargar datos</td></tr>';
    }
  }

  function actualizarMiniStats(data) {
    document.getElementById('mini-total').textContent = data.total_global.toLocaleString('es-MX');
    document.getElementById('mini-anios').textContent = data.por_anio.length;

    // Clientes y marcas únicos globales (necesitamos calcularlos a través de los datos por año)
    // Pero no tenemos esos totales únicos directamente, los sumamos de cada año? No es único.
    // Podemos hacer una consulta extra, pero por simplicidad usamos el año más reciente como referencia.
    // Mostraremos "—" o una nota.
    const ultimo = data.por_anio[0] || {};
    document.getElementById('mini-clientes').textContent = ultimo.total_clientes ? parseInt(ultimo.total_clientes).toLocaleString() : '—';
    document.getElementById('mini-marcas').textContent = ultimo.total_marcas ? parseInt(ultimo.total_marcas).toLocaleString() : '—';
  }

  function construirGrafico(porAnio) {
    const años = porAnio.map(r => r.anio_emision).reverse();
    const cantidades = porAnio.map(r => parseInt(r.total_certificados)).reverse();

    const ctx = document.getElementById('chart-anios').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: años,
        datasets: [{
          label: 'Certificados',
          data: cantidades,
          backgroundColor: 'rgba(26,86,219,0.7)',
          borderColor: '#1a56db',
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => ` ${ctx.raw.toLocaleString()} certificados`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { precision: 0 }
          }
        }
      }
    });
  }

  function construirTabla(porAnio) {
    const tbody = document.getElementById('tabla-anios');
    if (porAnio.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Sin datos</td></tr>';
      return;
    }
    tbody.innerHTML = porAnio.map(r => `
      <tr>
        <td><strong>${r.anio_emision}</strong></td>
        <td>${parseInt(r.total_certificados).toLocaleString()}</td>
        <td>${r.total_clientes}</td>
        <td>${r.total_marcas}</td>
        <td>${r.primera_emision ? new Date(r.primera_emision).toLocaleDateString('es-MX') : '—'}</td>
        <td>${r.ultima_emision ? new Date(r.ultima_emision).toLocaleDateString('es-MX') : '—'}</td>
      </tr>
    `).join('');
  }

  function showAlert(msg, tipo='error') {
    const container = document.getElementById('alert-container');
    if (!container) return;
    container.innerHTML = `<div class="alert alert-${tipo}">${msg}</div>`;
    setTimeout(() => { container.innerHTML = ''; }, 5000);
  }

  cargarDatos();
</script>
</body>
</html>
