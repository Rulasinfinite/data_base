<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIDEC — Certificados</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .navbar-brand svg { display:block; }

    /* ══ Stats (3 columnas) ══ */
    .stats-grid { grid-template-columns: repeat(3, 1fr) !important; }

    /* ══ Badge magnitud ══ */
    .mag-DIMENSIONAL    { background:#eff4ff; color:#1a56db; }
    .mag-ELÉCTRICA      { background:#fef3c7; color:#92400e; }
    .mag-TEMPERATURA    { background:#fce7f3; color:#9d174d; }
    .mag-HUMEDAD        { background:#e0f2fe; color:#0369a1; }
    .mag-PRESIÓN        { background:#f0fdf4; color:#166534; }
    .mag-MASA           { background:#f5f3ff; color:#5b21b6; }
    .mag-VOLUMEN        { background:#fff7ed; color:#9a3412; }
    .mag-FUERZA         { background:#fef2f2; color:#991b1b; }
    .mag-PAR-TORSIONAL  { background:#f0f9ff; color:#0c4a6e; }
    .mag-TIEMPO         { background:#f7fee7; color:#3f6212; }
    .mag-FLUJO          { background:#fdf4ff; color:#6b21a8; }
    .mag-ACELERACIÓN    { background:#fff1f2; color:#881337; }
    .mag-DENSIDAD       { background:#f0fdfa; color:#134e4a; }
    .mag-QUÍMICA        { background:#fefce8; color:#713f12; }

    /* ══ Panel de búsqueda ══ */
    .search-panel {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      overflow: hidden;
    }

    /* Barra principal */
    .search-main-row {
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--gray-100);
    }
    .search-main-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-main-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
      display: flex;
    }
    .search-main-input {
      width: 100%;
      padding: 11px 16px 11px 42px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .search-main-input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    }
    .search-main-input::placeholder { color: var(--gray-400); }
    .btn-buscar-main {
      padding: 11px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-buscar-main:hover  { background: #1d4ed8; }
    .btn-buscar-main:active { transform: scale(0.98); }
    .btn-buscar-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Filtros rápidos */
    .quick-filters-row {
      padding: 14px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      border-bottom: 1px solid var(--gray-100);
    }
    .quick-filters-row .form-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--gray-500);
      margin-bottom: 5px;
      display: block;
    }

    /* Toggle filtros avanzados */
    .advanced-toggle-row {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-toggle-advanced {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
      cursor: pointer;
      font-family: inherit;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .btn-toggle-advanced:hover { color: #1d4ed8; }
    .btn-toggle-advanced svg {
      transition: transform 0.2s;
    }
    .btn-toggle-advanced.open svg { transform: rotate(180deg); }

    .btn-limpiar-link {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--gray-400);
      cursor: pointer;
      font-family: inherit;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-limpiar-link:hover { color: var(--gray-700); background: var(--gray-100); }

    /* Filtros avanzados (colapsable) */
    .advanced-filters {
      display: none;
      padding: 0 20px 16px;
      border-top: 1px dashed var(--gray-200);
      animation: slideDown 0.2s ease;
    }
    .advanced-filters.open { display: block; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .advanced-filters-grid {
      padding-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .advanced-filters-grid .form-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--gray-500);
      margin-bottom: 5px;
      display: block;
    }

    /* Chips de filtros activos */
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 20px 12px;
    }
    .filter-chips:empty { display: none; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--primary-light, #eff6ff);
      color: var(--primary);
      border: 1px solid rgba(37,99,235,0.2);
      border-radius: 20px;
      padding: 3px 10px 3px 10px;
      font-size: 12px;
      font-weight: 500;
      animation: chipIn 0.15s ease;
    }
    @keyframes chipIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--primary);
      padding: 0;
      display: flex;
      align-items: center;
      font-size: 14px;
      opacity: 0.7;
      transition: opacity 0.1s;
      font-family: inherit;
    }
    .chip-remove:hover { opacity: 1; }

    /* Barra de resultados */
    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
      color: var(--gray-500);
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page">

  <!-- Stats (sin "Última emisión") -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total certificados</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">en todos los años</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Año actual</div>
      <div class="stat-value" id="stat-anio">—</div>
      <div class="stat-sub" id="stat-anio-label">2025</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Años disponibles</div>
      <div class="stat-value" id="stat-anios">—</div>
      <div class="stat-sub" id="stat-rango">—</div>
    </div>
  </div>

  <!-- Panel de búsqueda mejorado -->
  <div class="search-panel">

    <!-- ① Barra principal -->
    <div class="search-main-row">
      <div class="search-main-wrap">
        <span class="search-main-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input class="search-main-input" type="text" id="q"
               placeholder="Buscar por No. informe, cliente, No. serie, identificación, modelo, marca…"
               autocomplete="off">
      </div>
      <button class="btn-buscar-main" id="btn-buscar" onclick="buscar(1)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Buscar
      </button>
    </div>

    <!-- ② Filtros rápidos (siempre visibles) -->
    <div class="quick-filters-row">
      <div>
        <label class="form-label" for="filtro-cliente">Cliente</label>
        <input class="form-control" type="text" id="filtro-cliente" placeholder="Nombre del cliente"
               onkeydown="if(event.key==='Enter') buscar(1)">
      </div>
      <div>
        <label class="form-label" for="filtro-serie">No. de serie</label>
        <input class="form-control" type="text" id="filtro-serie" placeholder="Número de serie"
               onkeydown="if(event.key==='Enter') buscar(1)">
      </div>
      <div>
        <label class="form-label" for="filtro-magnitud">Magnitud / Área</label>
        <select class="form-control" id="filtro-magnitud">
          <option value="">Todas las áreas</option>
          <optgroup label="En operación">
            <option value="DIMENSIONAL">Dimensional</option>
            <option value="ELÉCTRICA">Eléctrica</option>
            <option value="PRESIÓN">Presión</option>
            <option value="MASA">Masa</option>
            <option value="VOLUMEN">Volumen</option>
            <option value="FUERZA">Fuerza</option>
            <option value="TEMPERATURA">Temperatura y Humedad</option>
            <option value="PAR TORSIONAL">Par Torsional</option>
            <option value="TIEMPO Y FRECUENCIA">Tiempo y Frecuencia</option>
            <option value="QUÍMICA">Química</option>
            <option value="FLUJO">Flujo</option>
            <option value="ACELERACIÓN">Aceleración</option>
            <option value="DENSIDAD">Densidad</option>
          </optgroup>
        </select>
      </div>
      <div>
        <label class="form-label" for="filtro-anio">Año</label>
        <select class="form-control" id="filtro-anio">
          <option value="">Todos los años</option>
        </select>
      </div>
    </div>

    <!-- ③ Chips de filtros activos -->
    <div class="filter-chips" id="filter-chips"></div>

    <!-- ④ Toggle de filtros avanzados -->
    <div class="advanced-toggle-row">
      <button class="btn-toggle-advanced" id="btn-toggle-adv" onclick="toggleAdvanced()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
        Más filtros
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <button class="btn-limpiar-link" onclick="limpiarFiltros()">Limpiar todo</button>
    </div>

    <!-- ⑤ Filtros avanzados (colapsables) -->
    <div class="advanced-filters" id="advanced-filters">
      <div class="advanced-filters-grid">
        <div>
          <label class="form-label" for="filtro-informe">No. Informe</label>
          <input class="form-control" type="text" id="filtro-informe" placeholder="Ej: LMD-…"
                 onkeydown="if(event.key==='Enter') buscar(1)">
        </div>
        <div>
          <label class="form-label" for="filtro-id">Identificación</label>
          <input class="form-control" type="text" id="filtro-id" placeholder="ID del instrumento"
                 onkeydown="if(event.key==='Enter') buscar(1)">
        </div>
        <div>
          <label class="form-label" for="filtro-marca">Marca</label>
          <input class="form-control" type="text" id="filtro-marca" placeholder="Marca del instrumento"
                 onkeydown="if(event.key==='Enter') buscar(1)">
        </div>
        <div>
          <label class="form-label" for="filtro-desde">Calibración desde</label>
          <input class="form-control" type="date" id="filtro-desde">
        </div>
        <div>
          <label class="form-label" for="filtro-hasta">Calibración hasta</label>
          <input class="form-control" type="date" id="filtro-hasta">
        </div>
        <div>
          <label class="form-label" for="filtro-orden">Ordenar por</label>
          <select class="form-control" id="filtro-orden">
            <option value="fecha_emision DESC">Calibración (más reciente)</option>
            <option value="fecha_emision ASC">Calibración (más antigua)</option>
            <option value="nombre_cliente ASC">Cliente (A-Z)</option>
            <option value="numero_informe ASC">No. Informe</option>
            <option value="marca ASC">Marca</option>
          </select>
        </div>
      </div>
    </div>

  </div><!-- /search-panel -->

  <!-- Tabla de resultados -->
  <div class="card">
    <div class="result-bar" id="result-bar" style="display:none">
      <span id="resultado-info"></span>
      <span id="resultado-tiempo" style="font-size:12px;color:var(--gray-400)"></span>
    </div>

    <div id="tabla-container">
      <div class="empty-state" style="padding:60px 24px">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p style="font-size:14px;color:var(--gray-400)">Usa los filtros de arriba para buscar certificados.</p>
        <p style="font-size:12px;color:var(--gray-300);margin-top:6px">Puedes buscar por informe, cliente, serie o dejar todo vacío para ver todos.</p>
      </div>
    </div>

    <div class="pagination" id="paginacion" style="display:none">
      <span class="pagination-info" id="pag-info"></span>
      <div class="pagination-btns" id="pag-btns"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
(async function() {
  if (!(await Auth.requireLogin())) return;
  renderNavbar('inicio');
})();

  let paginaActual = 1;
  const LIMITE = 50;

  // ── Toggle filtros avanzados ────────────────────────────
  function toggleAdvanced() {
    const panel = document.getElementById('advanced-filters');
    const btn   = document.getElementById('btn-toggle-adv');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.querySelector('svg:last-child').style.transform = isOpen ? 'rotate(180deg)' : '';
    // Actualizar texto del botón
    const label = btn.querySelector('svg:last-child').previousSibling;
    btn.childNodes[2].textContent = isOpen ? ' Menos filtros ' : ' Más filtros ';
  }

  // ── Chips de filtros activos ────────────────────────────
  const CHIP_LABELS = {
    q:               'Búsqueda',
    'filtro-informe':'No. Informe',
    'filtro-cliente':'Cliente',
    'filtro-serie':  'No. Serie',
    'filtro-id':     'Identificación',
    'filtro-marca':  'Marca',
    'filtro-magnitud':'Magnitud',
    'filtro-anio':   'Año',
    'filtro-desde':  'Desde',
    'filtro-hasta':  'Hasta',
  };

  function actualizarChips() {
    const container = document.getElementById('filter-chips');
    container.innerHTML = '';
    Object.entries(CHIP_LABELS).forEach(([id, label]) => {
      const el = document.getElementById(id);
      if (!el) return;
      const val = el.value?.trim();
      if (!val) return;
      // Obtener texto legible para selects
      let display = val;
      if (el.tagName === 'SELECT') {
        display = el.options[el.selectedIndex]?.text || val;
      }
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML = `<span style="color:var(--gray-500);font-size:11px;">${label}:</span> ${display}
        <button class="chip-remove" title="Quitar filtro" onclick="quitarChip('${id}')">×</button>`;
      container.appendChild(chip);
    });
  }

  function quitarChip(id) {
    const el = document.getElementById(id);
    if (el) el.value = '';
    actualizarChips();
    buscar(1);
  }

  // ── Stats ───────────────────────────────────────────────
  async function cargarStats() {
    try {
      const data = await api('/certificados/stats/resumen');
      document.getElementById('stat-total').textContent =
        data.total_global.toLocaleString('es-MX');

      const anioActual = new Date().getFullYear();
      document.getElementById('stat-anio-label').textContent = anioActual;
      const reg = data.por_anio.find(r => r.anio_emision == anioActual);
      document.getElementById('stat-anio').textContent =
        reg ? parseInt(reg.total_certificados).toLocaleString('es-MX') : '0';

      document.getElementById('stat-anios').textContent = data.por_anio.length;
      if (data.por_anio.length > 1) {
        const years = data.por_anio.map(r => r.anio_emision);
        document.getElementById('stat-rango').textContent =
          `${Math.min(...years)} – ${Math.max(...years)}`;
      }

      // Llenar select de años
      const sel = document.getElementById('filtro-anio');
      data.por_anio.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.anio_emision;
        opt.textContent = `${r.anio_emision}  (${parseInt(r.total_certificados).toLocaleString()})`;
        sel.appendChild(opt);
      });
    } catch (e) { console.error('Stats:', e); }
  }

  // ── Buscar ──────────────────────────────────────────────
  async function buscar(pagina = 1) {
    paginaActual = pagina;
    const btn = document.getElementById('btn-buscar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Buscando…';
    const t0 = Date.now();

    const params = new URLSearchParams();
    const add = (k, id) => {
      const v = document.getElementById(id)?.value?.trim();
      if (v) params.set(k, v);
    };
    add('q',             'q');
    add('numero_informe','filtro-informe');
    add('cliente',       'filtro-cliente');
    add('serie',         'filtro-serie');
    add('identificacion','filtro-id');
    add('marca',         'filtro-marca');
    add('magnitud',      'filtro-magnitud');
    add('anio',          'filtro-anio');
    add('desde',         'filtro-desde');
    add('hasta',         'filtro-hasta');
    add('orden',         'filtro-orden');
    params.set('pagina', pagina);
    params.set('limite', LIMITE);

    actualizarChips();

    try {
      const data = await api('/certificados?' + params.toString());
      const ms = Date.now() - t0;
      renderTabla(data, ms);
    } catch (e) {
      document.getElementById('tabla-container').innerHTML =
        `<div class="alert alert-error" style="margin:20px">${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Buscar`;
    }
  }

  // ── Render tabla ────────────────────────────────────────
  function renderTabla(data, ms) {
    const bar = document.getElementById('result-bar');
    bar.style.display = 'flex';
    document.getElementById('resultado-info').textContent =
      `${data.total.toLocaleString('es-MX')} certificado${data.total !== 1 ? 's' : ''} encontrado${data.total !== 1 ? 's' : ''}`;
    document.getElementById('resultado-tiempo').textContent = `${ms}ms`;

    if (data.datos.length === 0) {
      document.getElementById('tabla-container').innerHTML = `
        <div class="empty-state" style="padding:48px">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <p>No se encontraron certificados con esos criterios.</p>
          <p style="font-size:12px;color:var(--gray-300);margin-top:6px">Intenta con términos más generales.</p>
        </div>`;
      document.getElementById('paginacion').style.display = 'none';
      return;
    }

    const magClass = (m) => {
      if (!m) return '';
      const key = m.toUpperCase().split(' ')[0];
      return `mag-${key}`;
    };

    const filas = data.datos.map(c => `
      <tr onclick="verDetalle(${c.id})" title="Ver certificado ${c.numero_informe || ''}">
        <td><span style="font-family:var(--font-mono);font-size:12px;color:var(--primary);font-weight:500">${c.numero_informe || '—'}</span></td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.nombre_cliente || ''}">${c.nombre_cliente || '—'}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.descripcion_instrumento || ''}">${c.descripcion_instrumento || '—'}</td>
        <td>${c.marca || '—'}</td>
        <td><span style="font-family:var(--font-mono);font-size:12px">${c.numero_serie || '—'}</span></td>
        <td><span style="font-family:var(--font-mono);font-size:12px">${c.identificacion || '—'}</span></td>
        <td><span class="badge ${magClass(c.magnitud_evaluada)}">${c.magnitud_evaluada || '—'}</span></td>
        <td>${formatFecha(c.fecha_emision)}</td>
        <td><span class="badge badge-gray">${c.anio_emision}</span></td>
      </tr>
    `).join('');

    document.getElementById('tabla-container').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>No. Informe</th>
              <th>Cliente</th>
              <th>Instrumento</th>
              <th>Marca</th>
              <th>No. Serie</th>
              <th>Identificación</th>
              <th>Magnitud</th>
              <th>Fecha de calibración</th>
              <th>Año</th>
            </tr>
          </thead>
          <tbody>${filas}</tbody>
        </table>
      </div>`;

    renderPaginacion(data);
  }

  function renderPaginacion(data) {
    const pag = document.getElementById('paginacion');
    if (data.paginas <= 1) { pag.style.display = 'none'; return; }
    pag.style.display = 'flex';
    document.getElementById('pag-info').textContent =
      `Página ${data.pagina} de ${data.paginas}`;
    const btns = document.getElementById('pag-btns');
    btns.innerHTML = '';
    const addBtn = (label, p, disabled = false, active = false) => {
      const b = document.createElement('button');
      b.className = 'page-btn' + (active ? ' active' : '');
      b.textContent = label; b.disabled = disabled;
      b.onclick = () => buscar(p);
      btns.appendChild(b);
    };
    addBtn('‹', data.pagina - 1, data.pagina === 1);
    let ini = Math.max(1, data.pagina - 2);
    let fin = Math.min(data.paginas, data.pagina + 2);
    if (ini > 1) addBtn('1', 1);
    if (ini > 2) { const s = document.createElement('span'); s.textContent = '…'; s.className = 'page-btn'; s.style.cursor='default'; btns.appendChild(s); }
    for (let i = ini; i <= fin; i++) addBtn(i, i, false, i === data.pagina);
    if (fin < data.paginas - 1) { const s = document.createElement('span'); s.textContent = '…'; s.className = 'page-btn'; s.style.cursor='default'; btns.appendChild(s); }
    if (fin < data.paginas) addBtn(data.paginas, data.paginas);
    addBtn('›', data.pagina + 1, data.pagina === data.paginas);
  }

  function limpiarFiltros() {
    ['q','filtro-informe','filtro-cliente','filtro-serie','filtro-id',
     'filtro-marca','filtro-desde','filtro-hasta'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('filtro-magnitud').value = '';
    document.getElementById('filtro-anio').value     = '';
    document.getElementById('filtro-orden').value    = 'fecha_emision DESC';
    document.getElementById('filter-chips').innerHTML = '';
    document.getElementById('tabla-container').innerHTML = `
      <div class="empty-state" style="padding:60px 24px">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p style="font-size:14px;color:var(--gray-400)">Usa los filtros de arriba para buscar certificados.</p>
      </div>`;
    document.getElementById('result-bar').style.display  = 'none';
    document.getElementById('paginacion').style.display  = 'none';
  }

  function verDetalle(id) {
    window.location.href = `/detalle.html?id=${id}`;
  }

  // Enter en cualquier campo de texto activa la búsqueda
  document.querySelectorAll('input[type=text], input[type=date]').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(1); });
  });

  cargarStats();
</script>
</body>
</html>
